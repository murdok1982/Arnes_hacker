# MCP Servers Configuration
# Configuracion de servidores MCP para herramientas ofensivas

servers:
  nmap:
    type: nmap
    enabled: true
    description: "Escaneo de puertos y servicios con Nmap"
    tools:
      - name: nmap_scan
        description: "Escaneo basico de puertos"
      - name: nmap_vuln_scan
        description: "Escaneo de vulnerabilidades"
  
  sqlmap:
    type: sqlmap
    enabled: true
    description: "Inyeccion SQL automatizada"
    tools:
      - name: sqlmap_test
        description: "Test de inyeccion SQL"
  
  nuclei:
    type: nuclei
    enabled: true
    description: "Vulnerability scanner con templates"
    tools:
      - name: nuclei_scan
        description: "Escaneo de vulnerabilidades"
  
  metasploit:
    type: metasploit
    enabled: true
    description: "Framework de explotacion"
    tools:
      - name: metasploit_run
        description: "Ejecutar exploit"
      - name: metasploit_search
        description: "Buscar exploits"
  
  custom:
    type: custom
    enabled: false
    description: "Herramientas personalizadas"
    tools: []
