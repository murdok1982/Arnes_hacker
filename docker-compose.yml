version: '3.8'

services:
  arnes-fsociety:
    build: .
    container_name: arnes-fsociety-main
    volumes:
      - ./memory:/app/memory
      - ./output:/app/output
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - fsociety-net
    privileged: false
    security_opt:
      - no-new-privileges:false

  redis:
    image: redis:7-alpine
    container_name: arnes-fsociety-redis
    volumes:
      - redis-data:/data
    networks:
      - fsociety-net
    restart: unless-stopped

  sandbox:
    build: ./sandbox
    container_name: arnes-fsociety-sandbox
    profiles:
      - sandbox
    networks:
      - sandbox-net
    privileged: false
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
      - NET_ADMIN

volumes:
  redis-data:

networks:
  fsociety-net:
    driver: bridge
  sandbox-net:
    driver: bridge
    internal: true
